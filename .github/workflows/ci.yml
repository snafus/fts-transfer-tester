name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # ── Rocky 8 / Python 3.6.8  ────────────────────────────────────────────────
  # Canonical production target.  Pinned deps from requirements.txt.
  # Rocky 8 ships Python 3.6.8 as the default python3.
  rocky8-py36:
    name: Rocky 8 · Python 3.6.8 (canonical)
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install system prerequisites
        run: dnf install -y git python3 python3-pip python3-devel gcc

      - uses: actions/checkout@v4

      - name: Pin pip to last Python 3.6-compatible version
        run: python3 -m pip install --upgrade "pip==21.3.1"

      - name: Install pinned production + test dependencies
        run: |
          python3 -m pip install \
            "requests==2.27.1" \
            "urllib3==1.26.18" \
            "PyYAML==5.4.1" \
            "certifi==2021.10.8" \
            "pyflakes==2.4.0" \
            "pytest==4.6.11" \
            "responses==0.13.4" \
            "freezegun==1.1.0"
          python3 -m pip install -e .

      - name: Lint (pyflakes)
        run: python3 -m pyflakes fts_framework/

      - name: Unit tests
        run: python3 -m pytest tests/unit/ -v --tb=short

  # ── Rocky 9 / Python 3.9  ──────────────────────────────────────────────────
  # Rocky 9 ships Python 3.9 as the default python3.
  # Uses latest-compatible deps; install_requires from setup.py skipped via
  # --no-deps because the py3.6-era upper bounds are not needed on 3.9+.
  rocky9-py39:
    name: Rocky 9 · Python 3.9
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Install system prerequisites
        run: dnf install -y git python3 python3-pip

      - uses: actions/checkout@v4

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install test dependencies
        run: |
          python3 -m pip install \
            PyYAML requests \
            pyflakes pytest responses freezegun
          python3 -m pip install --no-deps -e .

      - name: Lint (pyflakes)
        run: python3 -m pyflakes fts_framework/

      - name: Unit tests
        run: python3 -m pytest tests/unit/ -v --tb=short

  # ── Rocky 9 / Python 3.13  ─────────────────────────────────────────────────
  # Forward-compatibility smoke test.  GitHub's pre-built Python 3.13
  # binaries require glibc 2.38 but Rocky 9 ships 2.34, so we install
  # python3.13 from EPEL 9 instead — that package is compiled against the
  # Rocky 9 glibc and runs without issue.
  rocky9-py313:
    name: Rocky 9 · Python 3.13
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Install EPEL and Python 3.13
        run: |
          dnf install -y git epel-release
          dnf install -y python3.13 python3.13-pip

      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          python3.13 -m pip install --upgrade pip
          python3.13 -m pip install \
            PyYAML requests \
            pyflakes pytest responses freezegun
          python3.13 -m pip install --no-deps -e .

      - name: Lint (pyflakes)
        run: python3.13 -m pyflakes fts_framework/

      - name: Unit tests
        run: python3.13 -m pytest tests/unit/ -v --tb=short
