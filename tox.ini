[tox]
# py36 is the canonical target runtime, tested in CI against CPython 3.6.8.
# Run locally via: tox -e local
envlist = py36

[testenv]
# Pinned deps matching requirements.txt — must stay in sync.
deps =
    pip==21.3.1
    pyflakes==2.4.0
    pytest==4.6.11
    responses==0.13.4
    freezegun==1.1.0
    PyYAML==5.4.1
    requests==2.27.1
    urllib3==1.26.18
    certifi==2021.10.8
commands =
    pyflakes fts_framework/
    pytest tests/unit/ -v {posargs}

# Local development: relaxed deps resolved by uv/pip against installed Python.
[testenv:local]
deps =
    pyflakes
    pytest
    responses
    freezegun
    PyYAML
    requests
commands =
    pyflakes fts_framework/
    pytest tests/unit/ -v {posargs}

# Python 3.9 smoke — mirrors the rocky9-py39 CI job.
# Run via: tox -e py39  (requires Python 3.9 on PATH)
[testenv:py39]
skip_install = true
deps =
    pyflakes
    pytest
    responses
    freezegun
    PyYAML
    requests
commands =
    pip install --no-deps -e {toxinidir}
    pyflakes fts_framework/
    pytest tests/unit/ -v {posargs}

# Python 3.13 smoke — mirrors the rocky9-py313 CI job.
# Run via: tox -e py313  (requires Python 3.13 on PATH)
[testenv:py313]
skip_install = true
deps =
    pyflakes
    pytest
    responses
    freezegun
    PyYAML
    requests
commands =
    pip install --no-deps -e {toxinidir}
    pyflakes fts_framework/
    pytest tests/unit/ -v {posargs}

[pytest]
testpaths = tests/unit
log_cli = true
log_cli_level = WARNING
